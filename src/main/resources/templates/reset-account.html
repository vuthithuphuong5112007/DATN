<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật tài khoản - Veloria</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fbf7f4] flex items-center justify-center min-h-screen">
<div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
    <h2 class="text-3xl font-bold text-[#4a1f1f] text-center mb-6">Thông Tin Mới</h2>

    <div th:if="${error}" class="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-center" th:text="${error}"></div>

    <form th:action="@{/reset-account}" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Tên Đăng Nhập Mới</label>
            <input type="text" name="username" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8c2a39] outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Mật Khẩu Mới</label>
            <input type="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#8c2a39] outline-none">
        </div>
        <button type="submit" class="w-full bg-[#8c2a39] text-white py-3 rounded-lg font-semibold hover:bg-[#a84857] transition">Cập Nhật Tài Khoản</button>
    </form>
</div>
</body>
</html>
