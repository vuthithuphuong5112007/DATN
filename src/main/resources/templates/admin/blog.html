<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloria - Quản lý Blog</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>
        :root {
            --color-primary: #b31640;
            --color-secondary: #F8E8EE;
            --color-success: #4CAF50;
            --color-danger: #F44336;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma;
            background: #f4f7f6;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #fff;
            box-shadow: 2px 0 5px rgba(0,0,0,.05);
        }

        .sidebar h2 {
            text-align: center;
            color: var(--color-primary);
            padding: 20px 0;
        }

        .sidebar nav a {
            display: block;
            padding: 15px 20px;
            color: #555;
            text-decoration: none;
        }

        .sidebar nav a:hover,
        .sidebar nav a.active-if-on-this-page-blog {
            background: var(--color-secondary);
            color: var(--color-primary);
            font-weight: 600;
            border-left: 5px solid var(--color-primary);
        }

        .main-content {
            flex: 1;
            padding: 30px;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group.full {
            grid-column: span 2;
        }

        .form-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .preview-img {
            max-width: 200px;
            border-radius: 8px;
            margin-top: 10px;
            display: block;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .actions button {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-save { background: var(--color-success); }
        .btn-delete { background: var(--color-danger); }
        .btn-reset { background: #007bff; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        th {
            background: var(--color-primary);
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: var(--color-secondary);
            cursor: pointer;
        }
    </style>
</head>

<body>
<div class="sidebar">
    <h2>Veloria Admin</h2>
    <nav>
        <a th:href="@{/admin/home}"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a th:href="@{/admin/sanpham}"><i class="fas fa-box"></i> Quản lý Sản phẩm</a>
        <a th:href="@{/admin/danhmuc}"><i class="fas fa-sitemap"></i> Quản lý Danh mục</a>
        <a th:href="@{/admin/donhang}"><i class="fas fa-shopping-cart"></i> Quản lý Đơn hàng</a>
        <a th:href="@{/admin/khachhang}"><i class="fas fa-users"></i> Quản lý Khách hàng</a>
        <a th:href="@{/admin/blog}" class="active-if-on-this-page-blog"><i class="fas fa-blog"></i> Quản lý Blog</a>
        <a th:href="@{/admin/baocaothongke}" class="active"><i class="fas fa-chart-bar"></i> Báo cáo & Thống kê</a>
        <a href="#"><i class="fas fa-cog"></i> Cài đặt Hệ thống</a>
        <hr style="border: none; border-top: 1px solid #eee; margin: 10px 20px;">
        <a th:href="@{/}" style="color: #c12909;"><i class="fas fa-home"></i> Quay lại Trang Chủ</a>
    </nav>
</div>

<div class="main-content">
    <h1>Quản lý Blog</h1>

    <div class="container">

        <!-- FORM -->
        <form th:action="@{/admin/blog/save}"
              th:object="${blog}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{image}"> <!-- GIỮ ẢNH -->

            <div class="form-grid">

                <div class="form-group">
                    <label>Tiêu đề</label>
                    <input type="text" th:field="*{title}" required>
                </div>

                <div class="form-group">
                    <label>Ảnh Blog</label>
                    <input type="file" name="imageFile" accept="image/*">

                    <!-- PREVIEW -->
                    <img th:src="${blog.image != null ? '/uploads/blog/' + blog.image : '/images/no-image.png'}" class="preview-img">
                    class="preview-img"
                    id="previewImage">
                </div>

                <div class="form-group full">
                    <label>Nội dung</label>
                    <textarea th:field="*{content}" rows="4"></textarea>
                </div>

            </div>

            <div class="actions">
                <button class="btn-save" type="submit">
                    <i class="fas fa-save"></i> Lưu
                </button>

                <button class="btn-delete" type="button"
                        id="btnDelete" onclick="deleteBlog()" disabled>
                    <i class="fas fa-trash"></i> Xóa
                </button>

                <button class="btn-reset" type="button" onclick="resetForm()">
                    <i class="fas fa-redo"></i> Reset
                </button>
            </div>
        </form>

        <!-- TABLE -->
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Ảnh</th>
                <th>Tiêu đề</th>
                <th>Nội dung</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="b : ${blogs}" onclick="loadBlog(this)">
                <td th:text="${b.id}"></td>

                <td>
                    <img th:if="${b.image != null}"
                         th:src="@{'/uploads/blog/' + ${b.image}}"
                         style="width:80px;border-radius:6px">
                </td>

                <td th:text="${b.title}"></td>
                <td th:text="${b.content}"></td>
            </tr>
            </tbody>
        </table>

    </div>
</div>

<script>

    function loadBlog(row) {
        document.querySelector('[name="id"]').value = row.cells[0].innerText;
        document.querySelector('[name="title"]').value = row.cells[2].innerText;
        document.querySelector('[name="content"]').value = row.cells[3].innerText;

        const img = row.cells[1].querySelector("img");
        if (img) {
            document.getElementById("previewImage").src = img.src;
        }

        document.getElementById('btnDelete').disabled = false;
    }

    function resetForm() {
        document.querySelector('form').reset();
        document.querySelector('[name="id"]').value = "";
        document.getElementById("previewImage").src = "/images/no-image.png";
        document.getElementById('btnDelete').disabled = true;
    }

    function deleteBlog() {
        const id = document.querySelector('[name="id"]').value;
        if (id && confirm("Xóa blog này?")) {
            window.location.href = "/admin/blog/delete/" + id;
        }
    }

    // PREVIEW ẢNH
    document.querySelector('input[name="imageFile"]').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            document.getElementById("previewImage").src = url;
        }
    });

</script>

</body>
</html>
