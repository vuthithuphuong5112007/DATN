<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title th:text="${blog.title} + ' | Veloria Blog'">Veloria Blog</title>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">

  <style>

    .header {
      background: #FFF;
      border-bottom: 1px solid #EEE;
      padding: 0 50px; /* Tăng padding hai bên đầu trang */
      height: 90px;   /* Tăng chiều cao header cho thoáng */
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-container {
      display: flex;
      align-items: center; /* Căn giữa tất cả theo chiều dọc */
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
    }

    .logo {
      font-size: 1.8em;
      font-weight: bold;
      color: #A52A2A;
      text-decoration: none;
      margin-right: 60px; /* Tạo khoảng trống 60px giữa Logo và Menu */
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      gap: 30px; /* Khoảng cách giữa các mục Trang chủ, Cửa hàng... */
      align-items: center;
    }

    body {
      font-family: 'Times New Roman', serif;
      color: #333; /* Màu xám đậm thay vì đen tuyền giúp mắt dễ chịu hơn */
    }

    /* Sửa đoạn này để xóa gạch chân và ép màu đen */
    .nav-links a,
    .nav-links a:visited,
    .nav-links a:active {
      text-decoration: none !important; /* Xóa gạch chân tuyệt đối */
      color: #333 !important;           /* Ép màu đen xám như thiết kế */
      font-weight: 500;
      transition: 0.3s;
      white-space: nowrap;
    }

    .cart-orders a,
    .cart-orders a:visited {
      text-decoration: none !important;
      color: #333 !important;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .cart-orders a:hover {
      color: #A52A2A !important;
    }

    /* Giữ hiệu ứng đổi màu khi di chuột vào */
    .nav-links a:hover {
      color: #A52A2A !important;
      text-decoration: none !important;
    }

    /* HEADER */
    .header { background-color: #FFF; border-bottom: 1px solid #EEE; }

    .logo {
      font-size: 1.8em;
      font-weight: bold;
      color: #A52A2A;
    }

    .auth-area {
      margin-left: auto; /* PHÉP MÀU: Tự động chiếm hết khoảng trống bên trái để đẩy mình sang phải */
      display: flex;
      align-items: center;
      gap: 25px; /* Khoảng cách giữa cụm tên và cụm giỏ hàng */
      flex-shrink: 0;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      white-space: nowrap; /* Giúp dòng "Xin chào..." không bị xuống dòng */
    }

    .cart-orders {
      display: flex;
      gap: 20px;
      border-left: 1px solid #EEE;
      padding-left: 20px;
      align-items: center;
    }


    .nav-links a {
      margin-right: 20px;
      text-decoration: none;
      color: #333;
      position: relative;
      font-weight: 500;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      background-color: #A52A2A;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      transition: 0.3s;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* DROPDOWN */
    .user-dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown-content a:hover {
      background-color: #eee;
    }

    /* BLOG */
    .blog-wrapper {
      max-width: 800px;
      margin: 60px auto;
      background: #fff;
      padding: 50px;
      border-radius: 12px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.08);
    }

    .blog-title {
      text-align: center;
      font-size: 2.4em;
      color: #A52A2A;
      margin-bottom: 10px;
    }

    .blog-meta {
      text-align: center;
      color: #777;
      font-size: 0.9em;
      margin-bottom: 30px;
    }

    .blog-image img {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 25px;
    }

    /* CONTENT ĐẸP */
    .blog-content {
      line-height: 1.9;
      font-size: 1.1em;
      color: #444;
      text-align: justify;
      white-space: pre-line;
    }


    .blog-content p {
      margin-bottom: 18px;
      text-indent: 30px;
    }

    .blog-content img {
      display: block;
      margin: 20px auto;
      max-width: 100%;
      border-radius: 8px;
    }

    .blog-back {
      display: inline-block;
      margin-top: 40px;
      color: #A52A2A;
      font-weight: bold;
      text-decoration: none;
    }

    .blog-back:hover {
      text-decoration: underline;
    }

    /* BUTTON */
    .cta-button {
      background-color: #A52A2A;
      color: #FFF;
      padding: 8px 15px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }

    .cta-button:hover {
      background-color: #6a1706;
    }
    .blog-content {
      white-space: pre-line; /* Giữ nguyên xuống dòng */
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="nav-container">
    <a th:href="@{/}" class="logo">Veloria - Own Your Glow</a>

    <div class="nav-links">
      <a th:href="@{/}">Trang Chủ</a>
      <a th:href="@{/shop}">Cửa Hàng</a>
      <a th:href="@{/contact}">Liên Hệ</a>
      <a th:href="@{/blog/danh-sach}" style="margin-right: 20px; text-decoration: none; color: #333;">Bài Viết</a>

      <div sec:authorize="hasAnyAuthority('OWNER', 'ADMIN')" style="display: inline-block;">
        <a th:href="@{/admin/home}" style="color: #A52A2A; font-weight: bold;">Quản Lý</a>
      </div>
    </div>

    <div class="auth-area">
      <div sec:authorize="isAuthenticated()" class="user-info">
                <span>Xin chào,
                    <b th:with="userPrincipal=${#authentication.principal}">
                        <span th:if="${userPrincipal instanceof T(org.springframework.security.oauth2.core.user.OAuth2User)}"
                              th:text="${userPrincipal.attributes.name}"></span>
                        <span th:unless="${userPrincipal instanceof T(org.springframework.security.oauth2.core.user.OAuth2User)}"
                              th:text="${#authentication.name}"></span>
                    </b>
                </span>
        <a th:href="@{/logout}" class="logout-btn" style="background: #555; color: #fff; padding: 5px 12px; border-radius: 4px; text-decoration: none; font-size: 13px;">Đăng xuất</a>
      </div>

      <div class="cart-orders">
        <th:block sec:authorize="isAnonymous()">
          <a th:href="@{/login}" style="margin-right: 5px;">Đăng nhập</a>
          <span style="margin-right: 10px; color: #ccc;">|</span>
        </th:block>

        <a th:href="@{/cart}">
          <i class="fas fa-shopping-bag" style="color:#A52A2A"></i>
          Giỏ hàng
          <span id="cart-count" style="color:#A52A2A; font-weight:bold;"
                th:text="${totalItems > 0 ? '(' + totalItems + ')' : '(0)'}">
                          (0)
                    </span>
          &rarr;
        </a>
        <a th:href="@{/orders}"><i class="fas fa-receipt" style="color:#A52A2A"></i> Đơn hàng &rarr;</a>
      </div>
    </div>
  </div>
</header>

<!-- BLOG DETAIL -->
<main class="blog-wrapper">

  <h1 class="blog-title" th:text="${blog.title}"></h1>

  <div class="blog-meta">
    <i class="fa fa-user"></i> Veloria
  </div>

  <div class="blog-image" th:if="${blog.image != null}">
    <img th:src="@{'/uploads/blog/' + ${blog.image}}">
  </div>

  <div class="blog-content" th:utext="${blog.content}"></div>

  <a th:href="@{/blog/danh-sach}" class="blog-back">
    ← Quay lại danh sách bài viết
  </a>

</main>

<footer style="text-align:center;padding:20px;color:#888">
  © 2025 Veloria Blog
</footer>

</body>
</html>
