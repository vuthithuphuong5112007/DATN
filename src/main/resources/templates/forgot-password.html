<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu - Veloria</title>
    <style>
        body { font-family: sans-serif; background: #F8E8EE; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #b31640; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
        .success { color: green; margin-bottom: 10px; }
        .error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="card">
    <h2 style="color: #b31640;">Quên mật khẩu?</h2>
    <div th:if="${message}" class="success" th:text="${message}"></div>
    <div th:if="${error}" class="error" th:text="${error}"></div>
    <form th:action="@{/forgot-password}" method="post">
        <input type="email" name="email" placeholder="Nhập email của bạn..." required>
        <button type="submit">Gửi yêu cầu</button>
    </form>
    <br>
    <a th:href="@{/login}" style="color: #666; text-decoration: none; font-size: 14px;">Quay lại Đăng nhập</a>
</div>
</body>
</html>
