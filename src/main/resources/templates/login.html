<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - Thế Giới Nước Hoa</title>
  <!-- Tải Tailwind CSS CDN (Quan trọng để có giao diện đẹp) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      /* Sử dụng background mờ ảo, sang trọng */
      background: linear-gradient(135deg, #fbf7f4 0%, #f4e8e1 100%);
      font-family: 'Inter', sans-serif;
      /* Thêm background image mờ nhẹ nhàng */
      background-image: url('/nuochoa5.jpg');
      background-size: cover;
      background-position: center;
    }
    /* Style cho tiêu đề sang trọng */
    .luxury-title {
      font-family: 'Playfair Display', serif;
      color: #4a1f1f; /* Màu đỏ rượu/nâu đậm */
    }
    /* Màu nhấn (Accent color): Vàng đồng/Đỏ rượu */
    .accent-color {
      background-color: #8c2a39; /* Đỏ rượu vang đậm */
    }
    .hover\:accent-color:hover {
      background-color: #a84857; /* Đỏ rượu vang nhạt hơn khi hover */
    }
    .text-accent-color {
      color: #8c2a39;
    }
    .hover\:text-accent-color:hover {
      color: #a84857;
    }
    /* Hiệu ứng focus tùy chỉnh */
    .input-focus:focus {
      outline: none;
      box-shadow: 0 0 0 2px #f4e8e1, 0 0 0 4px #8c2a39; /* Focus với viền Vàng/Đỏ rượu */
      border-color: #8c2a39;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-8 sm:p-10 space-y-8 bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl transition duration-300 transform border border-gray-100">

  <!-- Header -->
  <div class="text-center">
    <h1 class="text-4xl font-bold luxury-title">Veloria - Đăng Nhập</h1>
    <p class="mt-2 text-sm text-gray-600">
      Khám phá bộ sưu tập hương thơm độc quyền.
    </p>
  </div>

  <!-- Form Đăng nhập. Chú ý: action="/authenticate" khớp với SecurityConfig -->
  <form class="space-y-6" method="POST" action="/authenticate">

    <!-- Trường Tên Đăng Nhập -->
    <div>
      <label for="username" class="block text-sm font-medium text-gray-700">Tên Đăng Nhập</label>
      <div class="mt-1">
        <input
                id="username"
                name="username"
                type="text"
                autocomplete="username"
                required
                placeholder="Tên đăng nhập"
                class="input-focus appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-inner placeholder-gray-400 sm:text-base"
        >
      </div>
    </div>

    <!-- Trường Mật Khẩu -->
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700">Mật Khẩu</label>
      <div class="mt-1">
        <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
                placeholder="Mật khẩu"
                class="input-focus appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-inner placeholder-gray-400 sm:text-base"
        >
      </div>
    </div>

    <!-- Hiển thị lỗi (Chỉ hiển thị khi có tham số 'error' từ Spring Security) -->
    <div th:if="${param.error}" class="text-sm font-medium text-red-700 bg-red-100 p-3 rounded-xl border border-red-300">
      Tên đăng nhập hoặc mật khẩu không đúng. Vui lòng thử lại.
    </div>

    <div class="flex items-center justify-between">
      <div class="flex items-center">
        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-accent-color focus:ring-accent-color border-gray-300 rounded">
        <label for="remember-me" class="ml-2 block text-sm text-gray-900">
          Ghi nhớ đăng nhập
        </label>
      </div>

      <div class="text-sm">
        <a href="#" class="font-medium text-accent-color hover:text-red-800">
          Quên mật khẩu?
        </a>
      </div>
    </div>

    <!-- Nút Đăng Nhập -->
    <div>
      <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-lg text-sm font-medium text-white accent-color hover\:accent-color focus:outline-none focus:ring-4 focus:ring-offset-2 focus:ring-red-300 transition duration-300 ease-in-out transform hover:scale-[1.01]">
        Đăng Nhập
      </button>
    </div>
  </form>

  <!-- Link Đăng ký -->
  <div class="text-center">
    <p class="text-sm text-gray-600">
      Chưa có tài khoản?
      <a href="/register" class="font-medium text-accent-color hover:text-red-800">
        Đăng ký ngay
      </a>
    </p>
  </div>

  <div>
    <a href="/oauth2/authorization/google" class="w-full flex items-center justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition duration-300">

      <svg class="h-5 w-5 mr-2" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M44.5 20H24v8.5h11.889c-1.17 3.597-4.1 6.13-7.889 6.13-4.8 0-8.682-3.89-8.682-8.682S16.11 15.346 20.91 15.346c2.58 0 4.673 1.07 6.398 2.664l4.9-4.898C28.47 9.17 24.96 7.5 20.91 7.5 12.01 7.5 4.5 15.01 4.5 23.91s7.51 16.41 16.41 16.41c9.35 0 15.63-6.68 15.63-16.03 0-1.09-.15-2.07-.37-3.01H24v-8.5h20.5z" fill="#FFC107"/>
        <path d="M44.5 20H24v8.5h11.889c-1.17 3.597-4.1 6.13-7.889 6.13-4.8 0-8.682-3.89-8.682-8.682S16.11 15.346 20.91 15.346c2.58 0 4.673 1.07 6.398 2.664l4.9-4.898C28.47 9.17 24.96 7.5 20.91 7.5 12.01 7.5 4.5 15.01 4.5 23.91s7.51 16.41 16.41 16.41c9.35 0 15.63-6.68 15.63-16.03 0-1.09-.15-2.07-.37-3.01H24v-8.5h20.5z" fill="#4CAF50"/>
        <path d="M4.5 23.91c0-2.3 0-4.57.6-6.67l7.73 6.075c-.15 0-.3 0-.45.09-1.29.35-2.22 1.49-2.22 2.89s.93 2.54 2.22 2.89c.15.09.3.09.45.09l-7.73 6.075c-.6-2.1-1.02-4.43-1.02-6.78z" fill="#FBC02D"/>
        <path d="M20.91 40.32c-4.8 0-8.682-3.89-8.682-8.682S16.11 23.956 20.91 23.956c2.58 0 4.673 1.07 6.398 2.664l4.9-4.898C28.47 21.84 24.96 20.17 20.91 20.17c-4.493 0-8.11 3.617-8.11 8.11 0 4.493 3.617 8.11 8.11 8.11 4.493 0 8.11-3.617 8.11-8.11 0-.96-.17-1.875-.487-2.735H20.91v4.25z" fill="#1565C0"/>
        <path d="M4.5 23.91c0-2.3 0-4.57.6-6.67l7.73 6.075c-.15 0-.3 0-.45.09-1.29.35-2.22 1.49-2.22 2.89s.93 2.54 2.22 2.89c.15.09.3.09.45.09l-7.73 6.075c-.6-2.1-1.02-4.43-1.02-6.78z" fill="#FBC02D"/>
        <path d="M44.5 20H24v8.5h11.889c-1.17 3.597-4.1 6.13-7.889 6.13-4.8 0-8.682-3.89-8.682-8.682S16.11 15.346 20.91 15.346c2.58 0 4.673 1.07 6.398 2.664l4.9-4.898C28.47 9.17 24.96 7.5 20.91 7.5 12.01 7.5 4.5 15.01 4.5 23.91s7.51 16.41 16.41 16.41c9.35 0 15.63-6.68 15.63-16.03 0-1.09-.15-2.07-.37-3.01H24v-8.5h20.5z" fill="#FFC107"/>
        <path d="M44.5 20H24v8.5h11.889c-1.17 3.597-4.1 6.13-7.889 6.13-4.8 0-8.682-3.89-8.682-8.682S16.11 15.346 20.91 15.346c2.58 0 4.673 1.07 6.398 2.664l4.9-4.898C28.47 9.17 24.96 7.5 20.91 7.5 12.01 7.5 4.5 15.01 4.5 23.91s7.51 16.41 16.41 16.41c9.35 0 15.63-6.68 15.63-16.03 0-1.09-.15-2.07-.37-3.01H24v-8.5h20.5z" fill="#4CAF50"/>
      </svg>
      Đăng nhập bằng Google
    </a>
  </div>

</div>

</body>
</html>
