spring.application.name=Assaiment_Java6

server.port=8080

# Cấu hình JDBC cho SQL Server (Quan trọng: Đã thêm encoding vào URL)
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
# Đảm bảo URL này chỉ là 1 dòng liên tục, không có ký tự \ và không có khoảng trắng thừa.
spring.datasource.url=jdbc:sqlserver://LAPTOP-K69714AL;databaseName=java6_ass;portNumber=1433;encrypt=false;trustServerCertificate=true;sendStringParametersAsUnicode=true
spring.datasource.username=SA
spring.datasource.password=123456

# --- Cấu hình JPA/Hibernate (Đã đúng) ---
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.properties.hibernate.connection.CharSet=utf8
spring.jpa.properties.hibernate.connection.characterEncoding=utf8
spring.jpa.properties.hibernate.connection.useUnicode=true

# --- Cấu hình Encoding cho Tomcat (Đã đúng) ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8
spring.thymeleaf.encoding=UTF-8

# Tắt caching cho tài nguyên tĩnh
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true

#thông tin định danh ứng dụng của tôi với gg khi mà tôi cho phép user đăng nhập bằng tài khoản gg
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

